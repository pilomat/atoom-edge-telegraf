[[inputs.mqtt_consumer]]
  servers = ["${MQTT_URL}"]
  topics = ["edge/+/events/control/action/+"]
  qos = 1
  connection_timeout = "30s"
  client_id = "telegraf-control-action"
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  tls_ca   = "${MQTT_TLS_CA}"
  tls_cert = "${MQTT_TLS_CERT}"
  tls_key  = "${MQTT_TLS_KEY}"
  insecure_skip_verify = false
  persistent_session = true
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "control_action_events"
    timestamp_path = "ts"
    timestamp_format = "2006-01-02T15:04:05Z07:00"

    # Tags: low / controlled cardinality, useful for filtering and grouping
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "type"
      rename = "event_type"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "gatewayId"
      rename = "gateway_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "tenantId"
      rename = "tenant_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "facilityId"
      rename = "facility_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "zoneId"
      rename = "zone_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "moduleId"
      rename = "module_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "actuatorId"
      rename = "actuator_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "deviceId"
      rename = "device_id"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "deviceTopic"
      rename = "device_topic"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "commandKey"
      rename = "command_key"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "source"
      rename = "source"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "ackType"
      rename = "ack_type"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "desiredState"
      rename = "desired_state"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "desiredPower"
      rename = "desired_power"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "desiredMode"
      rename = "desired_mode"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "desiredFan"
      rename = "desired_fan"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "actualState"
      rename = "actual_state"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "actualPower"
      rename = "actual_power"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "actualMode"
      rename = "actual_mode"
      optional = true

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "actualFan"
      rename = "actual_fan"
      optional = true

    # Fields: numeric and descriptive values
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "commandId"
      rename = "command_id"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "channel"
      rename = "channel"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "topic"
      rename = "mqtt_topic"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ruleId"
      rename = "rule_id"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "phase"
      rename = "phase"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "actionTemplateId"
      rename = "action_template_id"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "correlationId"
      rename = "correlation_id"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "snapshotVersion"
      rename = "snapshot_version"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ackTopic"
      rename = "ack_topic"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "reason"
      rename = "reason"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "desiredTemp"
      rename = "desired_temp"
      type = "int"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "actualTemp"
      rename = "actual_temp"
      type = "int"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ackLatencyMs"
      rename = "ack_latency_ms"
      type = "int"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "retryCount"
      rename = "retry_count"
      type = "int"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "maxRetries"
      rename = "max_retries"
      type = "int"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "timeoutMs"
      rename = "timeout_ms"
      type = "int"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "backoffMs"
      rename = "backoff_ms"
      type = "int"
      optional = true

[[processors.starlark]]
  namepass = ["control_action_events"]
  script = "/etc/telegraf/telegraf.d/45-mqtt-control-action-transform.star"

[[outputs.file]]
  files = ["/tmp/control_action_events.lp"]
  data_format = "influx"
  namepass = ["control_action_events"]
