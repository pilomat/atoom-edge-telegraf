###############################################################################
# MQTT STATE INGEST (TLS via ENV)
#
# Topic:
#   tele/<tenantId>/<facilityId>/<zoneId>/<moduleId>/<deviceTopic>/STATE
#
# Measurement:
#   device_state
###############################################################################

[[inputs.mqtt_consumer]]
  servers  = ["${MQTT_URL}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"

  tls_ca   = "${MQTT_TLS_CA}"
  tls_cert = "${MQTT_TLS_CERT}"
  tls_key  = "${MQTT_TLS_KEY}"
  insecure_skip_verify = false

  topics  = ["tele/+/+/+/+/+/STATE"]
  qos = 0
  client_id = "telegraf_mqtt_state"
  persistent_session = true

  data_format = "json_v2"

  # tele/<tenantId>/<facilityId>/<zoneId>/<moduleId>/<deviceTopic>/STATE
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "tele/+/+/+/+/+/STATE"
    tags  = "_/tenantId/facilityId/zoneId/moduleId/deviceTopic/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "device_state"

    ###########################################################################
    # Top-level numeric fields (if present)
    ###########################################################################
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "UptimeSec"
      rename = "uptime_s"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "Heap"
      rename = "heap"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "Sleep"
      rename = "sleep"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "LoadAvg"
      rename = "load_avg"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "MqttCount"
      rename = "mqtt_count"
      type = "int"

    ###########################################################################
    # Optional string fields (keep as fields, not tags)
    ###########################################################################
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "Uptime"
      rename = "uptime_str"
      type = "string"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "SleepMode"
      rename = "sleep_mode"
      type = "string"

    ###########################################################################
    # Berry (optional)
    ###########################################################################
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "Berry"
      optional = true
      disable_prepend_keys = true
      included_keys = ["HeapUsed","Objects"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        HeapUsed = "berry_heap_used"
        Objects  = "berry_objects"

    ###########################################################################
    # Wifi (optional)
    ###########################################################################
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "Wifi"
      optional = true
      disable_prepend_keys = true
      included_keys = ["AP","SSId","BSSId","Channel","Mode","RSSI","Signal","LinkCount","Downtime"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        AP        = "wifi_ap"
        SSId      = "wifi_ssid"
        BSSId     = "wifi_bssid"
        Channel   = "wifi_channel"
        Mode      = "wifi_mode"
        RSSI      = "wifi_rssi_pct"
        Signal    = "wifi_signal_dbm"
        LinkCount = "wifi_link_count"
        Downtime  = "wifi_downtime_str"
