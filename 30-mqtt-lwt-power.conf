###############################################################################
# MQTT LWT + POWER INGEST (TLS via ENV)
###############################################################################

###############################################################################
# LWT (Online / Offline)
#
# Topic:
#   tele/<tenantId>/<facilityId>/<zoneId>/<moduleId>/<deviceTopic>/LWT
#
# Measurement:
#   mqtt_availability
###############################################################################
[[inputs.mqtt_consumer]]
  servers  = ["${MQTT_URL}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"

  tls_ca   = "${MQTT_TLS_CA}"
  tls_cert = "${MQTT_TLS_CERT}"
  tls_key  = "${MQTT_TLS_KEY}"
  insecure_skip_verify = false

  topics  = ["tele/+/+/+/+/+/LWT"]
  qos = 0
  client_id = "telegraf_mqtt_lwt"
  persistent_session = true

  # LWT payload is a plain string: "Online" / "Offline"
  data_format = "value"
  data_type   = "string"
  name_override = "mqtt_availability"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "tele/+/+/+/+/+/LWT"
    tags  = "_/tenantId/facilityId/zoneId/moduleId/deviceTopic/_"


###############################################################################
# POWER<X> (ON / OFF)
#
# Topic:
#   stat/<tenantId>/<facilityId>/<zoneId>/<moduleId>/<deviceTopic>/POWER<X>
#
# Measurement:
#   actuator_power
###############################################################################
[[inputs.mqtt_consumer]]
  servers  = ["${MQTT_URL}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"

  tls_ca   = "${MQTT_TLS_CA}"
  tls_cert = "${MQTT_TLS_CERT}"
  tls_key  = "${MQTT_TLS_KEY}"
  insecure_skip_verify = false

  # Match POWER, POWER1, POWER2, ...
  topics  = ["stat/+/+/+/+/+/POWER+"]
  qos = 0
  client_id = "telegraf_mqtt_power"
  persistent_session = true

  # POWER payload is plain string: "ON" / "OFF"
  data_format = "value"
  data_type   = "string"
  name_override = "actuator_power"

  # stat/<tenantId>/<facilityId>/<zoneId>/<moduleId>/<deviceTopic>/POWER<X>
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "stat/+/+/+/+/+/POWER+"
    tags  = "_/tenantId/facilityId/zoneId/moduleId/deviceTopic/channel"
