[[inputs.mqtt_consumer]]
  servers  = ["${MQTT_URL}"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"

  tls_ca   = "${MQTT_TLS_CA}"
  tls_cert = "${MQTT_TLS_CERT}"
  tls_key  = "${MQTT_TLS_KEY}"
  insecure_skip_verify = false

  topics  = ["tele/+/+/+/+/+/SENSOR"]
  qos = 0
  client_id = "telegraf_mqtt_sensors"
  persistent_session = true

  data_format = "json_v2"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "tele/+/+/+/+/+/SENSOR"
    tags  = "_/tenantId/facilityId/zoneId/moduleId/deviceTopic/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "telemetry_sensors"

    # -------------------------
    # DHT22 / AM2301
    # -------------------------
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "DHT22"
      optional = true
      disable_prepend_keys = true
      included_keys = ["Temperature","Humidity","DewPoint"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        Temperature = "dht22_temperature_c"
        Humidity    = "dht22_humidity_pct"
        DewPoint    = "dht22_dewpoint_c"

    [[inputs.mqtt_consumer.json_v2.object]]
      path = "AM2301"
      optional = true
      disable_prepend_keys = true
      included_keys = ["Temperature","Humidity","DewPoint"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        Temperature = "dht22_temperature_c"
        Humidity    = "dht22_humidity_pct"
        DewPoint    = "dht22_dewpoint_c"

    # -------------------------
    # SHT30 / SHT3X
    # -------------------------
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "SHT30"
      optional = true
      disable_prepend_keys = true
      included_keys = ["Temperature","Humidity","DewPoint"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        Temperature = "sht30_temperature_c"
        Humidity    = "sht30_humidity_pct"
        DewPoint    = "sht30_dewpoint_c"

    [[inputs.mqtt_consumer.json_v2.object]]
      path = "SHT3X"
      optional = true
      disable_prepend_keys = true
      included_keys = ["Temperature","Humidity","DewPoint"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        Temperature = "sht30_temperature_c"
        Humidity    = "sht30_humidity_pct"
        DewPoint    = "sht30_dewpoint_c"

    # -------------------------
    # BH1750 (Lux)
    # -------------------------
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "BH1750"
      optional = true
      disable_prepend_keys = true
      included_keys = ["Illuminance"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        Illuminance = "lux"

    # -------------------------
    # SCD40
    # -------------------------
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "SCD40"
      optional = true
      disable_prepend_keys = true
      included_keys = ["CarbonDioxide","CO2","Temperature","Humidity","DewPoint"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        CarbonDioxide = "co2_ppm"
        CO2           = "co2_ppm"
        eCO2          = "eco2_ppm"
        Temperature   = "scd40_temperature_c"
        Humidity      = "scd40_humidity_pct"
        DewPoint      = "scd40_dewpoint_c"

    # -------------------------
    # ECProbe
    # -------------------------
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "ECProbe"
      optional = true
      disable_prepend_keys = true
      included_keys = ["Temperature","Conductivity"]
      [inputs.mqtt_consumer.json_v2.object.renames]
        Temperature  = "ecprobe_temperature_c"
        Conductivity = "ecprobe_conductivity_us_cm"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "TempUnit"
      rename = "temp_unit"
      type = "string"
      optional = true

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ConductivityUnit"
      rename = "conductivity_unit"
      type = "string"
      optional = true
